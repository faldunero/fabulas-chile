<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterios de Chile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progreso-suave { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-stone-100 min-h-screen text-slate-800">
    <header class="bg-blue-900 text-white p-6 text-center shadow-md">
        <h1 class="text-2xl font-bold tracking-tighter uppercase">Expedición Leyendas de Chile</h1>
        <div id="marcador-pasos" class="text-blue-200 text-sm mt-1 font-mono">Posición: 0%</div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <!-- MAPA DE AVANCE -->
        <section class="bg-white p-6 rounded-3xl shadow-xl mb-6">
            <div class="flex justify-between text-[10px] mb-2 font-bold text-slate-400">
                <span>NORTE</span><span>CENTRO</span><span>SUR</span><span>AUSTRAL</span>
            </div>
            <div class="h-6 bg-slate-100 rounded-full border-2 border-slate-200 relative overflow-hidden">
                <div id="barra" class="progreso-suave absolute h-full bg-gradient-to-r from-orange-400 to-blue-500" style="width: 0%"></div>
            </div>
        </section>

        <!-- PANTALLA DE JUEGO -->
        <div id="pantalla" class="bg-white rounded-3xl p-8 shadow-xl border-b-8 border-slate-200">
            <div id="contenido-juego">
                <h2 class="text-xl font-bold text-center text-slate-500">Cargando expedición...</h2>
            </div>
        </div>

        <!-- ÁLBUM DE ESENCIAS -->
        <div id="esencias" class="grid grid-cols-4 gap-2 mt-6">
            <!-- Se llena con JS -->
        </div>
    </main>

    <script>
        let posicion = 0;
        let mitos = [];

        async function iniciar() {
            const res = await fetch('/api/leyendas');
            mitos = await res.json();
            renderEsencias();
            cargarMito(0);
        }

        function renderEsencias() {
            const zonas = ['Norte', 'Centro', 'Sur', 'Austral'];
            document.getElementById('esencias').innerHTML = zonas.map(z => `
                <div id="e-${z}" class="bg-white p-2 rounded-lg text-center opacity-30 grayscale transition-all">
                    <span class="text-2xl">💎</span>
                    <p class="text-[10px] font-bold">${z}</p>
                </div>
            `).join('');
        }

        function cargarMito(index) {
            if(index >= mitos.length) {
                document.getElementById('contenido-juego').innerHTML = "<h2>¡Felicidades! Completaste la ruta.</h2>";
                return;
            }
            const m = mitos[index];
            document.getElementById('contenido-juego').innerHTML = `
                <span class="text-orange-500 font-bold uppercase text-sm">${m.zona}</span>
                <h2 class="text-3xl font-black mb-4">${m.titulo}</h2>
                <p class="mb-6 italic text-slate-600">"${m.historia}"</p>
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <p class="font-bold mb-4">${m.pregunta}</p>
                    <div class="grid gap-2">
                        ${m.opciones.map((op, i) => `
                            <button onclick="check(${i}, ${index})" class="p-3 bg-white border-2 border-slate-200 rounded-xl hover:border-blue-500 transition-all text-left">
                                ${op}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function check(opt, idx) {
            const m = mitos[idx];
            if(opt === m.correcta) {
                alert("¡Correcto! Avanzas.");
                actualizarPosicion(15);
                document.getElementById(`e-${m.zona}`).classList.remove('opacity-30', 'grayscale');
                if(m.evento) {
                    setTimeout(() => {
                        alert(`${m.evento.nombre}: ${m.evento.msg}`);
                        actualizarPosicion(m.evento.efecto);
                        cargarMito(idx + 1);
                    }, 500);
                } else {
                    cargarMito(idx + 1);
                }
            } else {
                alert("¡Oh no! El clima te hace retroceder.");
                actualizarPosicion(-5);
            }
        }

        function actualizarPosicion(n) {
            posicion = Math.max(0, Math.min(100, posicion + n));
            document.getElementById('barra').style.width = posicion + "%";
            document.getElementById('marcador-pasos').innerText = `Posición: ${posicion}%`;
        }

        iniciar();
    </script>
</body>
</html>
