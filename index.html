<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterios de Chile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progreso-suave { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-stone-100 min-h-screen text-slate-800">
    <header class="bg-blue-900 text-white p-6 text-center shadow-md">
        <h1 class="text-2xl font-bold tracking-tighter uppercase">Expedición Leyendas de Chile</h1>
        <div id="marcador-pasos" class="text-blue-200 text-sm mt-1 font-mono">Posición: 0%</div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <!-- MAPA DE AVANCE -->
        <!-- Mapa con Gráfica de Pergamino -->
<section class="mb-8 relative p-4 rounded-xl shadow-2xl overflow-hidden border-4 border-amber-900/20">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/old-map.png')] opacity-30"></div>
    <h2 class="relative text-sm font-black text-amber-900 uppercase mb-4 tracking-widest text-center">Ruta de los Guardianes</h2>
    
    <div class="relative h-12 bg-amber-100/50 rounded-lg border-2 border-amber-800/30 flex items-center px-2">
        <!-- El Token del Jugador (Icono) -->
        <div id="jugador-token" class="progreso-suave absolute text-3xl z-10" style="left: 0%; transform: translateX(-50%);">
            🚶‍♂️
        </div>
        <!-- Barra de Progreso -->
        <div id="barra" class="progreso-suave h-4 bg-gradient-to-r from-amber-600 to-amber-900 rounded-full shadow-inner" style="width: 0%"></div>
    </div>
</section>

        <!-- PANTALLA DE JUEGO -->
<div id="pantalla" class="bg-white rounded-3xl p-8 shadow-xl border-b-8 border-slate-200">
    <div id="contenido-juego" class="flex flex-col items-center">
        <!-- Carta de Poker Visual -->
        <div id="contenedor-carta" class="relative w-56 h-80 bg-white rounded-2xl shadow-2xl border-8 border-white overflow-hidden mb-6 transform rotate-1 transition-transform hover:rotate-0">
            <img id="mito-imagen" src="/imagenes/placeholder.jpg" class="w-full h-full object-cover" alt="Carta de Leyenda">
            <div id="tag-zona" class="absolute top-2 right-2 bg-amber-700 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase shadow-md"></div>
        </div>

        <!-- Texto y Opciones -->
        <div class="w-full">
            <h2 id="mito-titulo" class="text-3xl font-black mb-2 text-slate-800 text-center uppercase tracking-tighter"></h2>
            <p id="mito-historia" class="mb-6 italic text-slate-600 text-center px-4 leading-tight"></p>
            
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <p id="mito-pregunta" class="font-bold text-lg mb-4 text-slate-700 text-center"></p>
                <div id="opciones" class="grid gap-3"></div>
            </div>
        </div>
    </div>
</div>
        <!-- ÁLBUM DE ESENCIAS -->
        <div id="esencias" class="grid grid-cols-4 gap-2 mt-6">
            <!-- Se llena con JS -->
        </div>
    </main>

   <script>
    let posicionJugador = 0;
    let mitos = [];
    let indiceActual = 0;

    async function iniciar() {
        try {
            // Cambiamos a la ruta de tu archivo estático o API
            const res = await fetch('/data/leyendas.json'); 
            mitos = await res.json();
            renderEsencias();
            cargarMito(0);
        } catch (error) {
            console.error("Error cargando el JSON:", error);
        }
    }

    function renderEsencias() {
        const zonas = ['Norte', 'Centro', 'Sur', 'Austral', 'Rapa Nui'];
        document.getElementById('esencias').innerHTML = zonas.map(z => `
            <div id="e-${z.replace(' ', '')}" class="bg-white p-2 rounded-lg text-center opacity-30 grayscale transition-all">
                <span class="text-2xl">💎</span>
                <p class="text-[10px] font-bold">${z}</p>
            </div>
        `).join('');
    }

    function cargarMito(index) {
        if(index >= mitos.length) {
            document.getElementById('contenido-juego').innerHTML = "<h2 class='text-2xl font-bold'>¡Felicidades Felipe! Completaste la ruta de Ludolab.cl</h2>";
            return;
        }

        indiceActual = index;
        const m = mitos[index];
        const esTruco = m.tipo === "truco";
        
        // Definir la ruta de la imagen según la carpeta
        const rutaImagen = esTruco 
            ? `/imagenes/trucos/${m.slug}.jpg` 
            : `/imagenes/mitos/${m.slug}.jpg`;

        document.getElementById('contenido-juego').innerHTML = `
            <div class="flex flex-col items-center">
                <span class="text-orange-500 font-bold uppercase text-sm">${m.zona || 'Evento'}</span>
                <h2 class="text-3xl font-black mb-4">${m.nombre}</h2>
                
                <!-- Visualizador de la Carta -->
                <img src="${rutaImagen}" alt="${m.nombre}" class="w-64 h-auto rounded-2xl shadow-2xl mb-6 border-4 border-white">
                
                ${esTruco ? `
                    <div class="bg-yellow-100 p-6 rounded-2xl border-2 border-yellow-400 text-center">
                        <p class="text-lg font-bold text-yellow-800">${m.msg}</p>
                        <button onclick="aplicarTruco(${index})" class="mt-4 px-6 py-2 bg-yellow-500 text-white rounded-full font-bold">ENTENDIDO</button>
                    </div>
                ` : `
                    <div class="bg-slate-50 p-4 rounded-2xl w-full">
                        <p class="font-bold mb-4 text-center">¿En qué lugar de Chile ocurre esto?</p>
                        <div class="grid gap-2">
                            ${m.opciones.map((op) => `
                                <button onclick="check('${op}', '${m.correcta}', '${m.zona}')" class="p-3 bg-white border-2 border-slate-200 rounded-xl hover:border-blue-500 transition-all text-left font-medium">
                                    ${op}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `}
            </div>
        `;
    }

    function check(elegida, correcta, zona) {
        if(elegida === correcta) {
            alert("¡Correcto!");
            actualizarPosicion(10); // Avanza 10 puntos por acierto
            
            // Iluminar esencia de la zona
            const idZona = zona.replace(' ', '');
            if(document.getElementById(`e-${idZona}`)) {
                document.getElementById(`e-${idZona}`).classList.remove('opacity-30', 'grayscale');
            }

            // Probabilidad del 20% de que aparezca un truco aleatorio antes de la siguiente
            if(Math.random() < 0.2) {
                lanzarEventoAleatorio();
            } else {
                cargarMito(indiceActual + 1);
            }
        } else {
            alert("Error. La leyenda te hace retroceder.");
            actualizarPosicion(-5);
        }
    }

    function aplicarTruco(index) {
        const truco = mitos[index];
        if (typeof truco.efecto === "number") {
            actualizarPosicion(truco.efecto * 10); // Multiplicamos por 10 para que se note en la barra
        }
        cargarMito(indiceActual + 1);
    }

    function lanzarEventoAleatorio() {
        const trucos = mitos.filter(m => m.tipo === "truco");
        const azar = trucos[Math.floor(Math.random() * trucos.length)];
        
        // Mostramos el truco temporalmente
        document.getElementById('contenido-juego').innerHTML = `
            <div class="flex flex-col items-center animate-bounce">
                <h2 class="text-2xl font-black text-red-600 mb-4">¡EVENTO SORPRESA!</h2>
                <img src="/imagenes/trucos/${azar.slug}.jpg" class="w-64 h-auto rounded-2xl shadow-2xl mb-4 border-4 border-red-500">
                <p class="text-center font-bold">${azar.msg}</p>
                <button onclick="finalizarEvento(${azar.efecto === 'pierde_turno' ? 0 : azar.efecto})" class="mt-4 px-6 py-2 bg-red-600 text-white rounded-full">CONTINUAR</button>
            </div>
        `;
    }

    function finalizarEvento(puntos) {
        if(typeof puntos === "number") actualizarPosicion(puntos * 10);
        cargarMito(indiceActual + 1);
    }

    function actualizarPosicion(valor) {
        posicionJugador += valor;
        if(posicionJugador < 0) posicionJugador = 0;
        if(posicionJugador > 400) posicionJugador = 400;
        
        const progreso = (posicionJugador / 400) * 100;
        const barra = document.getElementById('barra-progreso');
        if(barra) barra.style.width = `${progreso}%`;
    }

    iniciar();
</script>
</body>
</html>
