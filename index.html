<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterios de Chile - Ludolab</title>
    <style>
        :root {
            --primary: #2c3e50;
            --norte: #e67e22;
            --centro: #27ae60;
            --sur: #2980b9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-container { max-width: 800px; width: 100%; padding: 20px; text-align: center; }
        
        /* Mapa Visual */
        #mapa { display: flex; justify-content: space-around; background: #ddd; padding: 20px; border-radius: 15px; margin: 20px 0; position: relative; }
        .zona { padding: 15px; border-radius: 10px; color: white; flex: 1; margin: 0 5px; opacity: 0.3; transition: 0.3s; font-weight: bold; }
        .zona.activa { opacity: 1; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .norte { background: var(--norte); }
        .centro { background: var(--centro); }
        .sur { background: var(--sur); }

        /* Pantalla de Carta */
        #carta-display { height: 380px; margin: 20px auto; border: 8px solid var(--primary); border-radius: 20px; overflow: hidden; background: #fff; width: 280px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        #carta-display img { width: 100%; height: 100%; object-fit: cover; }

        /* Controles y Texto */
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; background: var(--primary); color: white; margin: 10px; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #34495e; transform: translateY(-2px); }
        .hidden { display: none; }
        #feedback { min-height: 1.5em; font-size: 1.1em; color: #555; margin: 10px 0; }
        #ubicacion-nombre { color: var(--primary); margin-top: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Misterios de Chile</h1>
    <p>Desarrollado por <strong>Ludolab.cl</strong></p>

    <!-- Selección de Inicio -->
    <div id="inicio">
        <h3>Elige tu punto de partida para la investigación:</h3>
        <button class="btn" onclick="iniciarJuego('NORTE')">Ruta Norte (Arica) 🌵</button>
        <button class="btn" onclick="iniciarJuego('SUR')">Ruta Sur (Punta Arenas) ❄️</button>
    </div>

    <!-- Interfaz de Juego -->
    <div id="juego" class="hidden">
        <div id="mapa">
            <div id="z-norte" class="zona norte">NORTE</div>
            <div id="z-centro" class="zona centro">CENTRO</div>
            <div id="z-sur" class="zona sur">SUR</div>
        </div>

        <div id="info">
            <h2 id="ubicacion-nombre">Hito: -</h2>
            <div id="feedback">Cargando misterios...</div>
        </div>

        <div id="carta-display">
            <img id="carta-img" src="" alt="Cargando carta...">
        </div>

        <div id="controles">
            <button id="btn-accion" class="btn" onclick="proximoTurno()">Investigar Próximo Hito</button>
            <button class="btn" style="background:#7f8c8d;" onclick="location.reload()">Reiniciar</button>
        </div>
        <h2 id="mensaje-final" style="color: #27ae60;"></h2>
    </div>
</div>

<script>
    // Lista de Mitos sincronizada con tu carpeta imagenes/mitos/
    const ruta = [
        { id: "AM-01CL", nombre: "Licanantay", zona: "norte", img: "imagenes/mitos/licanantay.jpg" },
        { id: "AM-05CL", nombre: "La Tirana", zona: "norte", img: "imagenes/mitos/la_tirana.jpg" },
        { id: "AM-15CL", nombre: "Camino a Santiago", zona: "centro", img: "imagenes/mitos/camino_santiago.jpg" },
        { id: "AM-25CL", nombre: "El Caleuche", zona: "sur", img: "imagenes/mitos/caleuche.jpg" },
        { id: "AM-35CL", nombre: "El Trauco", zona: "sur", img: "imagenes/mitos/el_trauco.jpg" }
    ];

    // Lista de Trucos sincronizada con imagenes/trucos/
    const trucos = [
        { nombre: "Corriente de Humboldt", efecto: 1, msg: "¡Vientos favorables! Avanzas un hito extra.", img: "imagenes/trucos/truco_corriente_humboldt.jpg" },
        { nombre: "Derrumbe Andino", efecto: -1, msg: "El camino está bloqueado. Retrocedes para buscar otra ruta.", img: "imagenes/trucos/truco_derrumbe_andino.jpg" }
    ];

    let indiceActual = 0;
    let direccion = "NORTE";
    let juegoTerminado = false;

    function iniciarJuego(modo) {
        direccion = modo;
        indiceActual = (modo === "NORTE") ? 0 : ruta.length - 1;
        document.getElementById('inicio').classList.add('hidden');
        document.getElementById('juego').classList.remove('hidden');
        actualizarInterfaz("¡Comienza la aventura! Resuelve el primer misterio.");
    }

    function actualizarInterfaz(mensaje) {
        const hito = ruta[indiceActual];
        document.getElementById('ubicacion-nombre').innerText = `Ubicación: ${hito.nombre} (${hito.id})`;
        document.getElementById('carta-img').src = hito.img;
        document.getElementById('feedback').innerText = mensaje;
        
        // Actualizar zonas en el mapa
        document.querySelectorAll('.zona').forEach(z => z.classList.remove('activa'));
        const zonaActiva = document.getElementById(`z-${hito.zona}`);
        if(zonaActiva) zonaActiva.classList.add('activa');
    }

    function proximoTurno() {
        if (juegoTerminado) return;

        // Probabilidad de evento aleatorio (Truco)
        if (Math.random() < 0.25) {
            const t = trucos[Math.floor(Math.random() * trucos.length)];
            document.getElementById('carta-img').src = t.img;
            document.getElementById('feedback').innerText = t.msg;
            
            // Aplicar efecto del truco según la dirección de viaje
            if (direccion === "NORTE") indiceActual += t.efecto;
            else indiceActual -= t.efecto;

        } else {
            // Avance normal
            if (direccion === "NORTE") indiceActual++;
            else indiceActual--;
            document.getElementById('feedback').innerText = "Misterio resuelto. Sigues avanzando por el territorio.";
        }

        // Validar límites y fin de juego
        if (indiceActual < 0) {
            indiceActual = 0;
        } else if (indiceActual >= ruta.length) {
            finalizar();
        } else {
            actualizarInterfaz(document.getElementById('feedback').innerText);
        }
    }

    function finalizar() {
        juegoTerminado = true;
        document.getElementById('mensaje-final').innerText = "🎉 ¡Felicidades! Has completado la travesía por Chile.";
        document.getElementById('btn-accion').classList.add('hidden');
        document.getElementById('feedback').innerText = "Investigación terminada con éxito.";
    }
</script>

</body>
</html>
