<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misterios de Chile - Ludolab.cl</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #f39c12; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Contenedor del Mapa Ilustrado */
        #sidebar-mapa { width: 350px; background: #fff; border-right: 2px solid #ddd; display: flex; flex-direction: column; padding: 10px; position: relative; }
        #chile-map-bg { 
            flex: 1; 
            background: url('https://i.pinimg.com/originals/82/8e/3c/828e3c155554199650059c6b76774e17.jpg') no-repeat center; 
            background-size: contain; 
            position: relative;
            border-radius: 15px;
        }
        
        /* Marcador de Posición */
        #marcador { 
            position: absolute; 
            font-size: 30px; 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            left: 50%;
            transform: translateX(-50%);
        }

        /* Área de Juego */
        #main-game { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #card-container { 
            width: 350px; background: #fff; border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; 
            text-align: center; border: 4px solid var(--primary);
        }
        #card-img { width: 100%; height: 400px; object-fit: cover; background: #eee; }
        
        .card-info { padding: 20px; }
        .card-info h2 { margin: 0; color: var(--primary); font-size: 28px; }
        .card-info p { color: #666; font-style: italic; margin: 10px 0; min-height: 40px; }

        /* Botones */
        .controls { display: flex; gap: 10px; justify-content: center; padding-bottom: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-main { background: var(--primary); color: white; flex: 2; }
        .btn-sub { background: #dcdde1; color: #7f8c8d; flex: 1; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="sidebar-mapa">
    <h3 style="text-align: center; color: var(--primary);">Expedición Chile</h3>
    <div id="chile-map-bg">
        <div id="marcador">📍</div>
    </div>
</div>

<div id="main-game">
    <div id="setup" class="card-info">
        <h1>Misterios de Chile</h1>
        <p>Selecciona tu punto de inicio</p>
        <button class="btn btn-main" onclick="start('NORTE')">Desde el Norte 🌵</button>
        <button class="btn btn-main" onclick="start('SUR')">Desde el Sur ❄️</button>
    </div>

    <div id="game" class="hidden">
        <div id="card-container">
            <img id="card-img" src="" alt="Mito">
            <div class="card-info">
                <h2 id="card-title">-</h2>
                <p id="card-desc">Cargando misterio...</p>
                <div class="controls">
                    <button class="btn btn-main" onclick="play()">Resolver Misterio</button>
                    <button class="btn btn-sub" onclick="location.reload()">Reiniciar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Lista de mitos con posiciones (0 = Arica, 100 = Magallanes)
    const mitos = [
        { n: "Licanantay", img: "licanantay.jpg", pos: 5 },
        { n: "La Tirana", img: "la_tirana.jpg", pos: 15 },
        { n: "Alicanto", img: "ojo_alicanto.jpg", pos: 25 },
        { n: "Camino a Santiago", img: "camino_santiago.jpg", pos: 45 },
        { n: "La Llorona", img: "la_llorona.jpg", pos: 55 },
        { n: "El Caleuche", img: "caleuche.jpg", pos: 75 },
        { n: "El Trauco", img: "el_trauco.jpg", pos: 85 },
        { n: "Cuero de Agua", img: "cuero_agua_sur.jpg", pos: 95 }
    ];

    const trucos = [
        { n: "Corriente Humboldt", img: "truco_corriente_humboldt.jpg", move: 10 },
        { n: "Derrumbe Andino", img: "truco_derrumbe_andino.jpg", move: -10 }
    ];

    let currentPos = 0;
    let dir = 'NORTE';

    function start(modo) {
        dir = modo;
        currentPos = (modo === 'NORTE') ? 0 : 90;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        play(); // Carga la primera carta
    }

    function play() {
        let isTruco = Math.random() < 0.25;
        let item;

        if (isTruco) {
            item = trucos[Math.floor(Math.random() * trucos.length)];
            currentPos += (dir === 'NORTE') ? item.move : -item.move;
            render(item, "trucos", `¡Evento! ${item.n}`);
        } else {
            // Avance normal hacia el siguiente mito
            item = mitos[Math.floor(Math.random() * mitos.length)];
            currentPos += (dir === 'NORTE') ? 12 : -12;
            render(item, "mitos", "Has descubierto un nuevo mito. ¡Avanzas!");
        }

        // Límites
        if (currentPos < 0) currentPos = 0;
        if (currentPos > 95) {
            alert("¡Misión cumplida! Has recorrido todo Chile.");
            location.reload();
        }
        
        // Mover marcador 📍
        document.getElementById('marcador').style.top = currentPos + "%";
    }

    function render(item, folder, msg) {
        document.getElementById('card-img').src = `imagenes/${folder}/${item.img}`;
        document.getElementById('card-title').innerText = item.n;
        document.getElementById('card-desc').innerText = msg;
    }
</script>

</body>
</html>
